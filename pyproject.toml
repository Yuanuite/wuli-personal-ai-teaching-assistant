[tool.pytest.ini_options]
testpaths = [
    "teacher-console/tests",
]
pythonpath = [
    "teacher-console",
    ".claude/skills/manage-student-error-library/scripts",
]

[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.coverage.run]
source = ["teacher-console"]
