name: Deploy student site
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Assemble GitHub Pages bundle
        run: |
          mkdir -p pages-dist/diagrams
          cp -R student-site/. pages-dist/
          cp docs/diagrams/pipeline.workflow.html pages-dist/diagrams/
          cp docs/diagrams/system.architecture.html pages-dist/diagrams/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-dist
          force_orphan: true
