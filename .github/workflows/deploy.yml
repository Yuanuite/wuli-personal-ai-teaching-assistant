name: CI & Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pillow coverage
      - name: Run tests with coverage
        run: |
          coverage run --source=teacher-console -m pytest teacher-console/tests/ -q
          coverage report
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Assemble GitHub Pages bundle
        run: |
          mkdir -p pages-dist/diagrams
          cp -R student-site/. pages-dist/
          cp docs/diagrams/pipeline.workflow.html pages-dist/diagrams/
          cp docs/diagrams/system.architecture.html pages-dist/diagrams/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-dist
          force_orphan: true
